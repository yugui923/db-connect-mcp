# Development container with PostgreSQL 17 as a sidecar container
# Used by VS Code Dev Containers extension
services:
  devcontainer:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspaces/db-connect-mcp:cached
    command: sleep infinity
    environment:
      # PostgreSQL connection for development/tests
      PG_TEST_DATABASE_URL: postgresql+asyncpg://dbconnect:dbconnect_dev_password@postgres:5432/db_connect_test
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    container_name: devcontainer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: db_connect_test
      POSTGRES_USER: dbconnect
      POSTGRES_PASSWORD: dbconnect_dev_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.utf8"
    ports:
      - "5432:5432"
    volumes:
      # Initialization scripts (run in alphabetical order)
      - ../tests/docker/postgres/init:/docker-entrypoint-initdb.d:ro
      # Persistent data storage
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbconnect -d db_connect_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-dev-data:
    name: db-connect-mcp-dev-postgres-data
