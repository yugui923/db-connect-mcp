# Development container with PostgreSQL 17 as a sidecar container
# Used by VS Code Dev Containers extension
services:
  devcontainer:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace
      - claude-code-data:/home/vscode/.claude
    network_mode: host
    command: sleep infinity
    environment:
      # PostgreSQL connection for development/tests
      PG_TEST_DATABASE_URL: postgresql+asyncpg://devuser:devpassword@localhost:5432/devdb
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    container_name: devcontainer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: devdb
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.utf8"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      # Initialization scripts (run in alphabetical order)
      - ../tests/docker/postgres/init:/docker-entrypoint-initdb.d:ro
      # Persistent data storage
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d devdb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  claude-code-data:
    name: db-connect-mcp-dev-claude-data
  postgres-dev-data:
    name: db-connect-mcp-dev-postgres-data
