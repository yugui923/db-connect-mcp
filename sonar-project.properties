sonar.projectKey=yugui923_db-connect-mcp
sonar.organization=yugui923

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=db-connect-mcp
#sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=src
sonar.tests=tests

# Python-specific settings
sonar.python.version=3.12,3.13

# Exclude files from analysis
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/node_modules/**,**/.venv/**

# Coverage report (generated by pytest-cov in CI)
sonar.python.coverage.reportPaths=coverage.xml

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8
